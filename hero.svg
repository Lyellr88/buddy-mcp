<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">

  <!-- Glowing accent lines in rarity colors -->
  <line x1="40" y1="40" x2="40" y2="220" stroke="#FF55FF" stroke-width="3" opacity="0.4"/>
  <line x1="600" y1="40" x2="600" y2="220" stroke="#FFD700" stroke-width="3" opacity="0.4"/>
  <line x1="1160" y1="40" x2="1160" y2="220" stroke="#5599FF" stroke-width="3" opacity="0.4"/>

  <!-- Top Info Section - cleaner modern style -->
  <rect x="40" y="40" width="1120" height="180" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Rarity color accent bar at top -->
  <rect x="40" y="40" width="1120" height="4" rx="2" fill="url(#rarity-gradient)"/>

  <defs>
    <linearGradient id="rarity-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF55FF;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#55FF55;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5599FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon badges (minimal, clean) -->
  <!-- Roll badge -->
  <circle cx="70" cy="60" r="12" fill="none" stroke="#FF55FF" stroke-width="2" opacity="0.6"/>
  <text x="70" y="64" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#FF55FF" text-anchor="middle">🎲</text>

  <!-- Build badge -->
  <circle cx="96" cy="60" r="12" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  <text x="96" y="64" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#FFD700" text-anchor="middle">✨</text>

  <!-- Collect badge -->
  <circle cx="122" cy="60" r="12" fill="none" stroke="#5599FF" stroke-width="2" opacity="0.6"/>
  <text x="122" y="64" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5599FF" text-anchor="middle">📖</text>

  <!-- Heading -->
  <text x="60" y="130" font-family="Monaco, 'Courier New', monospace" font-size="48" font-weight="bold" fill="#79c0ff">buddy-mcp</text>

  <!-- Slogan right corner -->
  <text x="1100" y="130" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8b949e" text-anchor="end">Roll your buddy.</text>
  <text x="1100" y="155" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8b949e" text-anchor="end">Build unique.</text>
  <text x="1100" y="180" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#8b949e" text-anchor="end">Collect them all.</text>

  <!-- Divider under info section -->
  <line x1="40" y1="220" x2="1160" y2="220" stroke="#30363d" stroke-width="1"/>

  <!-- Main Content Section (3 Columns) -->

  <!-- Left Column: Roll/Gacha Concept -->
  <rect x="40" y="220" width="360" height="440" fill="#161b22" stroke="#30363d" stroke-width="2"/>

  <!-- Roll title -->
  <text x="220" y="260" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#79c0ff" text-anchor="middle">ROLL</text>

  <!-- Dice illustration -->
  <g transform="translate(220, 317)">
    <!-- Dice 1 -->
    <rect x="-45" y="-20" width="35" height="35" fill="none" stroke="#FF55FF" stroke-width="2" rx="2"/>
    <circle cx="-27" cy="-5" r="3" fill="#FF55FF"/>

    <!-- Dice 2 -->
    <rect x="10" y="-15" width="35" height="35" fill="none" stroke="#5599FF" stroke-width="2" rx="2"/>
    <circle cx="22" cy="-5" r="3" fill="#5599FF"/>
    <circle cx="30" cy="5" r="3" fill="#5599FF"/>

    <!-- Dice 3 -->
    <rect x="-24" y="29" width="35" height="35" fill="none" stroke="#55FF55" stroke-width="2" rx="2"/>
    <circle cx="6" cy="33" r="3" fill="#55FF55"/>
    <circle cx="-7" cy="46" r="3" fill="#55FF55"/>
    <circle cx="-20" cy="59" r="3" fill="#55FF55"/>
  </g>

  <!-- Roll description -->
  <text x="220" y="427" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#c9d1d9" text-anchor="middle" font-style="italic">
    <tspan x="220" dy="0">Roll for rare buddies</tspan>
    <tspan x="220" dy="15">with affection tokens</tspan>
    <tspan x="220" dy="15">and stat-based traits.</tspan>
  </text>

  <!-- Roll specs -->
  <text x="220" y="497" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6e7681" text-anchor="middle">
    <tspan x="220" dy="0">18 species • 5 rarities</tspan>
    <tspan x="220" dy="12">100+ stat combinations</tspan>
  </text>

  <!-- Vertical divider between left and center -->
  <line x1="400" y1="220" x2="400" y2="660" stroke="#30363d" stroke-width="1"/>

  <!-- Center Column: Featured Buddy -->
  <rect x="400" y="220" width="400" height="440" fill="#161b22" stroke="#30363d" stroke-width="2"/>

  <!-- Featured buddy title -->
  <text x="600" y="260" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#79c0ff" text-anchor="middle">FEATURED</text>

  <!-- Dragon sprite embedded from buddy-flumox-sprite-new.svg -->
  <svg x="470" y="280" width="260" height="150" viewBox="0 0 150 132" xmlns="http://www.w3.org/2000/svg">
    <text font-family="'Cascadia Code','Fira Code','Courier New',monospace" font-size="14" fill="#FF55FF" xml:space="preserve">
      <tspan x="24" y="36" fill="#FF55FF">   \^^^/    </tspan>
      <tspan x="24" y="56" fill="#FF55FF">  /^\  /^\  </tspan>
      <tspan x="24" y="76" fill="#FF55FF"> &lt;  ◉  ◉  &gt; </tspan>
      <tspan x="24" y="96" fill="#FF55FF"> (   ~~   ) </tspan>
      <tspan x="24" y="116" fill="#FF55FF">  `-vvvv-´  </tspan>
    </text>
  </svg>

  <!-- Buddy stats display -->
  <text x="600" y="450" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#c9d1d9" text-anchor="middle">
    <tspan x="600" dy="0">Epic Dragon • Flumox</tspan>
    <tspan x="600" dy="20">CHAOS 100 | DEBUG 69</tspan>
  </text>

  <!-- Vertical divider between center and right -->
  <line x1="800" y1="220" x2="800" y2="660" stroke="#30363d" stroke-width="1"/>

  <!-- Right Column: Collect/Dex Concept -->
  <rect x="800" y="220" width="360" height="440" fill="#161b22" stroke="#30363d" stroke-width="2"/>

  <!-- Collect title -->
  <text x="980" y="260" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#79c0ff" text-anchor="middle">COLLECT</text>

  <!-- Dex border box -->
  <rect x="825" y="303" width="310" height="220" fill="none" stroke="#30363d" stroke-width="2" rx="4"/>

  <!-- Dex header line -->
  <line x1="835" y1="318" x2="1125" y2="318" stroke="#79c0ff" stroke-width="1" opacity="0.5"/>

  <!-- Alternating row backgrounds -->
  <rect x="830" y="323" width="300" height="14" fill="#1f2632" opacity="0.3"/>
  <rect x="830" y="351" width="300" height="14" fill="#1f2632" opacity="0.3"/>
  <rect x="830" y="379" width="300" height="14" fill="#1f2632" opacity="0.3"/>

  <!-- BuddyDex Grid with colored discovered species -->
  <text x="980" y="334" font-family="Monaco, 'Courier New', monospace" font-size="12" fill="#c9d1d9" text-anchor="middle">
    <tspan x="980" dy="0" fill="#55FF55">[X] duck</tspan><tspan fill="#c9d1d9">       [ ] ???        </tspan><tspan fill="#5599FF">[X] cat</tspan>
  </text>
  <text x="980" y="348" font-family="Monaco, 'Courier New', monospace" font-size="12" fill="#c9d1d9" text-anchor="middle">
    <tspan x="980" dy="0">[ ] ???        </tspan><tspan fill="#FF55FF">[X] dragon</tspan><tspan fill="#c9d1d9">     [ ] ???</tspan>
  </text>
  <text x="980" y="362" font-family="Monaco, 'Courier New', monospace" font-size="12" fill="#c9d1d9" text-anchor="middle">
    <tspan x="980" dy="0" fill="#FFD700">[X] turtle</tspan><tspan fill="#c9d1d9">     [ ] ???        </tspan><tspan fill="#55FF55">[X] octopus</tspan>
  </text>
  <text x="980" y="376" font-family="Monaco, 'Courier New', monospace" font-size="12" fill="#6e7681" text-anchor="middle">
    <tspan x="980" dy="0">[ ] ???        [ ] ???        [ ] ???</tspan>
  </text>
  <text x="980" y="390" font-family="Monaco, 'Courier New', monospace" font-size="12" fill="#6e7681" text-anchor="middle">
    <tspan x="980" dy="0">[ ] ???        [ ] ???        [ ] ???</tspan>
  </text>
  <text x="980" y="404" font-family="Monaco, 'Courier New', monospace" font-size="12" fill="#6e7681" text-anchor="middle">
    <tspan x="980" dy="0">[ ] ???        [ ] ???        [ ] ???</tspan>
  </text>

  <!-- Progress bar visual -->
  <rect x="835" y="438" width="300" height="8" fill="#1f2632" stroke="#30363d" stroke-width="1" rx="2"/>
  <rect x="835" y="438" width="83" height="8" fill="#79c0ff" rx="2"/>

  <!-- Progress text -->
  <text x="980" y="458" font-family="Monaco, 'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle">
    <tspan x="980" dy="0">5/18 Discovered • ✨ 0 Shinies</tspan>
  </text>

  <!-- Collection description -->
  <text x="980" y="546" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#c9d1d9" text-anchor="middle" font-style="italic">
    <tspan x="980" dy="0">Persistent discovery tracker</tspan>
  </text>

  <!-- Bottom info section -->
  <rect x="40" y="660" width="1120" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>

  <text x="60" y="685" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6e7681">
    <tspan x="60" dy="0">MCP Server • Stat-based personalities • Binary patching • npm: buddy-mcp</tspan>
  </text>
</svg>
